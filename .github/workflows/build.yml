name: Build C9 Kernel KSUN (Lavender 4.4)

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo (owner/name)'
        required: true
        default: 'kucingoranye/android_kernel_xiaomi_sdm660_44'
      kernel_branch:
        description: 'Kernel source branch. android-4.4-stable=CLEAN San-Kernel 4.4 (REQUIRED for backslashxx hooks) | manual-hook-rksu-ksun=pre-patched legacy hook (only for hook_strategy=none)'
        required: true
        default: 'android-4.4-stable'
      kernel_commit:
        description: 'Pin kernel source to specific commit SHA (use "head" for latest).'
        required: true
        default: 'head'
      defconfig:
        description: 'Defconfig name (under arch/arm64/configs/). lavender_defconfig = lavender specific (San-Kernel 4.4).'
        required: true
        default: 'lavender_defconfig'
      ksun_repo:
        description: 'KernelSU implementation (KernelSU-Next/KernelSU-Next = upstream | ThRE-Team/KernelSU-Next = ThRE fork)'
        required: true
        default: 'KernelSU-Next/KernelSU-Next'
      ksun_branch:
        description: 'KernelSU tag/branch. legacy = rolling non-GKI branch (REQUIRED for non-GKI 4.4 + latest Manager, per KSU-Next dev) | v3.3.0 = GKI stable (breaks non-GKI hook) | v3.2.0 = previous.'
        required: true
        default: 'legacy'
      ksun_commit:
        description: 'Pin KSU to specific commit SHA (use "head" for branch head).'
        required: true
        default: 'head'
      susfs_branch:
        description: 'SUSFS branch'
        required: true
        default: 'kernel-4.4'
      enable_susfs:
        description: 'Apply SUSFS patches'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      hook_strategy:
        description: 'Hook strategy: backslashxx (RECOMMENDED for LATEST manager on non-GKI: backslashxx/JackA1ltman minimal syscall hooks) | none (kernel pre-patched) | kucingoranye_patch (legacy manual hook, NOT compatible w/ latest manager) | minimal | full'
        required: true
        default: 'backslashxx'
        type: choice
        options: ['backslashxx', 'kucingoranye_patch', 'minimal', 'full', 'none']
      pre_patched_kernel:
        description: 'Skip cloning KernelSU + skip applying patches if true. Set FALSE for manual-hook-rksu-ksun branch (hooks pre-patched but KSU driver still needs cloning).'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      use_llvm_linker:
        description: 'Use LLD (LLVM linker) instead of GNU ld. MUST be false for kernel 4.4 (ld.lld produces empty built-in.o on 4.4 - use GNU ld).'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      legacy_fstab:
        description: 'Patch lavender DTS to non-dynamic (legacy) fstab. Set true if device uses direct system/vendor partition (no super/dynamic). Fixes init "partition super not found".'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      hook_patch_file:
        description: 'kucingoranye patch file (kernel-4.4_4.9.patch for 4.4/4.9, kernel-4.19_5.4.patch for 4.19/5.4, kernel-4.14.patch for 4.14). Only used if hook_strategy=kucingoranye_patch.'
        required: false
        default: 'kernel-4.4_4.9.patch'
        type: choice
        options: ['kernel-4.4_4.9.patch', 'kernel-4.19_5.4.patch', 'kernel-4.14.patch']
      skip_sig_fix:
        description: 'Skip 3-arg signature fix on ksu-patches branch (set true if branch already synced with rsuntk modern)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      kernel_codename:
        description: 'Kernel codename (San-Kernel style branding, e.g. Blitz, Phoenix, Sentinel)'
        required: false
        default: 'Blitz'
      kernel_relver:
        description: 'Kernel release version (San-Kernel style, e.g. R1.0, R1.1.101)'
        required: false
        default: 'R1.2'
      enable_lto:
        description: 'LTO mode (off=no LTO, thin=ThinLTO parallel, full=Full LTO max optimize). WARNING: full LTO needs 16GB+ RAM and 2-3x build time.'
        required: false
        default: 'off'
        type: choice
        options: ['off', 'thin', 'full']
      enable_polly:
        description: 'Enable LLVM Polly loop optimizer (polyhedral optimization). Experimental on 4.4.'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      enable_cid_spoof:
        description: 'eMMC CID spoof. false=off | ioctl_only=Patch A (block.c, SAFE, only userspace MMC_IOC_CMD/DroidGuard) | full=Patch A+B (also mmc.c raw_cid, RISKY: may break FBE on encrypted userdata).'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'ioctl_only', 'full']

env:
  TZ: Asia/Jakarta
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Validate inputs (pre-flight check)
        run: |
          set -e
          echo "Checking kernel source repo accessibility..."
          if ! git ls-remote --exit-code --heads \
              "https://github.com/${{ inputs.kernel_repo }}.git" \
              "${{ inputs.kernel_branch }}" >/dev/null 2>&1; then
            echo "::error::Repo or branch not accessible: https://github.com/${{ inputs.kernel_repo }} @ ${{ inputs.kernel_branch }}"
            echo ""
            echo "Try one of these working sources for lavender (4.4):"
            echo "  - kucingoranye/android_kernel_xiaomi_sdm660_44 @ manual-hook-rksu-ksun (pre-patched hooks)"
            echo "  - kucingoranye/android_kernel_xiaomi_sdm660_44 @ android-4.4-stable (clean San-Kernel)"
            echo "  - user-why-red/android_kernel_xiaomi_sdm660_44 @ android-4.4-stable (San-Kernel upstream)"
            exit 1
          fi
          echo "OK: kernel source reachable."

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates ccache cpio \
            curl flex git kmod libelf-dev libssl-dev lz4 \
            make python3 rsync wget xz-utils zip zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libncurses-dev device-tree-compiler

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lavender44-${{ inputs.kernel_repo }}-${{ inputs.kernel_branch }}
          max-size: 2G

      - name: Clone kernel source
        run: |
          set -e
          KCOMMIT="${{ inputs.kernel_commit }}"
          if [ -z "$KCOMMIT" ] || [ "$KCOMMIT" = "head" ] || [ "$KCOMMIT" = "HEAD" ]; then
            echo "=== Shallow clone (head only) ==="
            git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
              "https://github.com/${{ inputs.kernel_repo }}.git" kernel_source
          else
            echo "=== Shallow clone with target commit fetch: $KCOMMIT ==="
            git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
              "https://github.com/${{ inputs.kernel_repo }}.git" kernel_source
            cd kernel_source
            # Fetch the specific commit shallowly
            git fetch --depth=1 origin "$KCOMMIT" || {
              echo "Direct fetch failed, expanding depth..."
              git fetch --depth=200 origin "${{ inputs.kernel_branch }}" 2>/dev/null || \
                git fetch --unshallow origin "${{ inputs.kernel_branch }}"
            }
            git checkout "$KCOMMIT" || {
              echo "::error::Failed to checkout commit $KCOMMIT"
              git log --oneline -10
              exit 1
            }
            cd ..
          fi

          cd kernel_source
          KERNEL_VERSION=$(make kernelversion 2>/dev/null | tail -1 | tr -d '[:space:]' || echo unknown)
          echo "KERNEL_VERSION=${KERNEL_VERSION}" >> $GITHUB_ENV
          echo "KERNEL_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "KERNEL_FULL_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "Final kernel HEAD: $(git rev-parse --short HEAD), version: ${KERNEL_VERSION}"

      - name: Inject CID spoof (eMMC serial randomisation)
        if: ${{ inputs.enable_cid_spoof != 'false' }}
        working-directory: kernel_source
        run: |
          set -e
          XLO="0x0000FFFF"
          XHI="0xFFFF0000"
          echo "=== CID SPOOF mode=${{ inputs.enable_cid_spoof }} | xor_lo=${XLO} xor_hi=${XHI} ==="

          # ---- Patch A: block.c ioctl path (SAFE - only user-space MMC_IOC_CMD, e.g. DroidGuard) ----
          # Kernel 4.4 may have block.c under drivers/mmc/card/ instead of drivers/mmc/core/
          BC=""
          for cand in drivers/mmc/core/block.c drivers/mmc/card/block.c; do
            if [ -f "$cand" ]; then BC="$cand"; break; fi
          done
          if [ -z "$BC" ]; then
            echo "::error::[A] block.c not found in mmc/core or mmc/card"
            exit 1
          fi
          echo "  [A] Found block.c at: $BC"

          # Find anchor: struct mmc_ioc_cmd *ic = &idata->ic;
          if grep -q "struct mmc_ioc_cmd \*ic = &idata->ic;" "$BC"; then
            awk -v xlo="$XLO" -v xhi="$XHI" '
              { print }
              /struct mmc_ioc_cmd \*ic = &idata->ic;/ && !done_a {
                print "\t/* CID-SPOOF: flip PSN in CMD2/CMD10 response */"
                print "\tif (ic->opcode == 2 || ic->opcode == 10) {"
                print "\t\tic->response[2] ^= " xlo ";"
                print "\t\tic->response[3] ^= " xhi ";"
                print "\t}"
                done_a = 1
              }
            ' "$BC" > /tmp/block.c && mv /tmp/block.c "$BC"
            echo "  [A] block.c patched:"
            grep -n "CID-SPOOF\|ic->response\[2\] \^=" "$BC" || true
          else
            # Fallback: try alternate anchor patterns for older 4.4 trees
            echo "  [A] Primary anchor not found, trying alternate patterns..."
            if grep -q "idata->ic" "$BC"; then
              echo "::warning::[A] idata->ic exists but anchor pattern differs. Manual check needed."
              grep -n "idata->ic" "$BC" | head -5
            else
              echo "::error::[A] No mmc_ioc_cmd anchor found in $BC"
            fi
            exit 1
          fi

          # ---- Patch B: mmc.c raw_cid (RISKY - affects in-kernel CID incl. FBE crypto) ----
          if [ "${{ inputs.enable_cid_spoof }}" = "full" ]; then
            MC=""
            for cand in drivers/mmc/core/mmc.c drivers/mmc/card/mmc.c; do
              if [ -f "$cand" ]; then MC="$cand"; break; fi
            done
            if [ -z "$MC" ]; then
              echo "::warning::[B] mmc.c not found — skipping Patch B"
            elif grep -q "mmc_decode_cid(struct mmc_card \*card)" "$MC"; then
              awk -v xlo="$XLO" -v xhi="$XHI" '
                { print }
                /mmc_decode_cid\(struct mmc_card \*card\)/ { infn = 1 }
                infn && /u32 \*resp = card->raw_cid;/ && !done_b {
                  print "\tcard->raw_cid[2] ^= " xlo ";"
                  print "\tcard->raw_cid[3] ^= " xhi ";"
                  done_b = 1
                  infn = 0
                }
              ' "$MC" > /tmp/mmc.c && mv /tmp/mmc.c "$MC"
              echo "  [B] mmc.c patched:"
              grep -n "raw_cid\[2\] \^=" "$MC" || echo "::warning::[B] raw_cid line not found — verify manually"
            else
              echo "::warning::[B] mmc_decode_cid signature differs — skipping Patch B"
              grep -n "mmc_decode_cid" "$MC" | head -5
            fi
          else
            echo "  [B] skipped (mode=ioctl_only) — safest, no FBE risk"
          fi

      - name: Resolve defconfig
        working-directory: kernel_source
        run: |
          set -e
          INPUT_DCFG="${{ inputs.defconfig }}"
          CONFIG_DIR="arch/arm64/configs"

          echo "Available defconfigs:"
          ls -1 "${CONFIG_DIR}" 2>/dev/null || true
          echo ""
          # Some sources nest configs under vendor/
          if [ -d "${CONFIG_DIR}/vendor" ]; then
            echo "(vendor/ subdir):"
            ls -1 "${CONFIG_DIR}/vendor"
            echo ""
          fi

          if [ "$INPUT_DCFG" = "auto" ] || [ -z "$INPUT_DCFG" ]; then
            # Try to autodetect a lavender defconfig
            CANDIDATES="lavender_defconfig lavender-perf_defconfig sdm660_defconfig sdm660-perf_defconfig"
            FOUND=""
            for c in $CANDIDATES; do
              if [ -f "${CONFIG_DIR}/${c}" ]; then FOUND="$c"; break; fi
              if [ -f "${CONFIG_DIR}/vendor/${c}" ]; then FOUND="vendor/${c}"; break; fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::Could not autodetect defconfig. List above shows what's available. Re-run with explicit defconfig name."
              exit 1
            fi
            DCFG_PATH="${CONFIG_DIR}/${FOUND}"
            DCFG_NAME="$FOUND"
          else
            if [ -f "${CONFIG_DIR}/${INPUT_DCFG}" ]; then
              DCFG_PATH="${CONFIG_DIR}/${INPUT_DCFG}"
              DCFG_NAME="${INPUT_DCFG}"
            elif [ -f "${CONFIG_DIR}/vendor/${INPUT_DCFG}" ]; then
              DCFG_PATH="${CONFIG_DIR}/vendor/${INPUT_DCFG}"
              DCFG_NAME="vendor/${INPUT_DCFG}"
            else
              echo "::error::Defconfig not found: ${INPUT_DCFG}"
              exit 1
            fi
          fi

          echo "Using defconfig: ${DCFG_NAME}"
          echo "DCFG_PATH=${DCFG_PATH}" >> $GITHUB_ENV
          echo "DCFG_NAME=${DCFG_NAME}" >> $GITHUB_ENV
          # Derive device codename from defconfig (e.g. lavender_defconfig -> lavender)
          DEVICE_CODENAME=$(basename "${DCFG_NAME}" | sed 's|_defconfig$||; s|-perf_defconfig$||; s|-perf$||; s|^vendor/||')
          echo "Device codename: ${DEVICE_CODENAME}"
          echo "DEVICE_CODENAME=${DEVICE_CODENAME}" >> $GITHUB_ENV

      - name: Clone toolchain (Proton Clang)
        run: |
          mkdir -p toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang
          echo "=== Verify ==="
          ls toolchain/clang/bin/ | head -10
          toolchain/clang/bin/clang --version

      - name: Clone KernelSU
        if: ${{ inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          KSU_REPO="${{ inputs.ksun_repo }}"
          KSU_BRANCH="${{ inputs.ksun_branch }}"
          echo "Setting up KernelSU from ${KSU_REPO}@${KSU_BRANCH}"

          curl -LSs "https://raw.githubusercontent.com/${KSU_REPO}/${KSU_BRANCH}/kernel/setup.sh" \
            | bash -s "${KSU_BRANCH}"

          # Determine which directory was created (rsuntk uses "KernelSU", KSUN uses "KernelSU-Next")
          if [ -d KernelSU ]; then
            KSU_DIR="KernelSU"
          elif [ -d KernelSU-Next ]; then
            KSU_DIR="KernelSU-Next"
          else
            echo "::error::KernelSU directory not found after setup"
            exit 1
          fi

          cd "${KSU_DIR}"

          # Pin to specific commit if ksun_commit != "head"
          KSU_COMMIT="${{ inputs.ksun_commit }}"
          if [ "$KSU_COMMIT" != "head" ] && [ -n "$KSU_COMMIT" ]; then
            echo "  Pinning KSU to commit: $KSU_COMMIT"
            git fetch --unshallow 2>/dev/null || true
            git checkout "$KSU_COMMIT" || {
              echo "::error::Failed to checkout KSU commit $KSU_COMMIT"
              exit 1
            }
            echo "  ✅ KSU pinned to $(git rev-parse --short HEAD)"
          fi

          KSUN_VER=$(git describe --tags --abbrev=0 2>/dev/null || git rev-parse --short HEAD)
          echo "KSUN_VERSION=${KSUN_VER}" >> $GITHUB_ENV
          echo "KSU_DIR=${KSU_DIR}" >> $GITHUB_ENV
          echo "KernelSU directory: ${KSU_DIR}, version: ${KSUN_VER}"

      - name: Detect KSU hooks integration mode
        if: ${{ inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          # Check if kernel source already has KSU manual hook calls (e.g. ksu-patches branch)
          if grep -rq "ksu_handle_execveat\|ksu_handle_faccessat\|ksu_handle_stat" fs/ 2>/dev/null; then
            echo "✅ Manual KSU hooks already exist in kernel source"
            echo "KSU_HOOK_MODE=manual_existing" >> $GITHUB_ENV
          else
            echo "⚙️  Clean kernel source - will inject MINIMAL hooks (only execveat)"
            echo "KSU_HOOK_MODE=minimal_inject" >> $GITHUB_ENV
          fi

      - name: Fix existing hook signatures (ksu-patches branch only)
        if: ${{ env.KSU_HOOK_MODE == 'manual_existing' && inputs.skip_sig_fix != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Fixing hook signature mismatch (rsuntk expects 3-arg ksu_handle_stat) ==="
          if grep -q "ksu_handle_stat(&dfd, &filename);" fs/stat.c; then
            sed -i 's|extern int ksu_handle_stat(int \*dfd, const char __user \*\*filename_user);|extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);|' fs/stat.c
            sed -i 's|ksu_handle_stat(&dfd, &filename);|ksu_handle_stat(\&dfd, \&filename, NULL);|' fs/stat.c
            echo "  ✅ fs/stat.c patched to 3-arg signature"
          fi

      - name: Apply kucingoranye/kernel_patches (manual_hook + path_umount backport)
        if: ${{ inputs.hook_strategy == 'kucingoranye_patch' && inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Strategy: apply kucingoranye/kernel_patches ==="
          echo "Source: https://github.com/kucingoranye/kernel_patches"
          echo ""

          BASE_URL="https://raw.githubusercontent.com/kucingoranye/kernel_patches/main"
          HOOK_PATCH_FILE="${{ inputs.hook_patch_file }}"
          HOOK_PATCH_FILE="${HOOK_PATCH_FILE:-kernel-4.4_4.9.patch}"
          HOOK_PATCH_URL="${BASE_URL}/manual_hook-rksu-ksun/${HOOK_PATCH_FILE}"
          echo "Using hook patch: ${HOOK_PATCH_FILE}"
          UMOUNT_PATCH_URL="${BASE_URL}/path_umount/backport-path_umount.patch"

          # Download patches
          curl -sSL "$HOOK_PATCH_URL" -o /tmp/manual-hook.patch
          curl -sSL "$UMOUNT_PATCH_URL" -o /tmp/path_umount.patch

          echo "manual-hook.patch:"
          ls -la /tmp/manual-hook.patch
          head -5 /tmp/manual-hook.patch
          echo ""
          echo "path_umount.patch:"
          ls -la /tmp/path_umount.patch
          head -5 /tmp/path_umount.patch
          echo ""

          # Apply hook patch
          echo "=== Apply manual hook patch ==="
          if patch -p1 --forward --fuzz=3 --no-backup-if-mismatch < /tmp/manual-hook.patch; then
            echo "✅ Manual hook patch applied cleanly"
          else
            echo "::warning::Manual hook patch had rejects:"
            REJECTS=$(find . -name "*.rej" 2>/dev/null)
            for f in $REJECTS; do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done

            # Critical files: exec.c, stat.c, open.c, read_write.c, reboot.c, selinux/hooks.c
            # Non-critical: drivers/input/input.c (volume-key safe-mode trigger only)
            CRITICAL_REJECT=0
            for crit in "fs/exec.c.rej" "fs/stat.c.rej" "fs/open.c.rej" "fs/read_write.c.rej" "kernel/reboot.c.rej" "security/selinux/hooks.c.rej"; do
              if echo "$REJECTS" | grep -q "$crit"; then
                echo "::error::CRITICAL reject: $crit"
                CRITICAL_REJECT=1
              fi
            done

            if [ "$CRITICAL_REJECT" -eq 1 ]; then
              echo "::error::Cannot proceed with critical rejects"
              exit 1
            fi

            echo "::warning::Only non-critical input.c reject — proceeding without input hook"
            echo "Note: ksu_input_hook (volume-key safe-mode trigger) will NOT work on this build"
            # clean rejects to keep tree tidy
            find . -name "*.rej" -delete 2>/dev/null
            find . -name "*.orig" -delete 2>/dev/null
          fi
          echo ""

          # Apply path_umount backport
          echo "=== Apply path_umount backport ==="
          if patch -p1 --forward --fuzz=3 --no-backup-if-mismatch < /tmp/path_umount.patch; then
            echo "✅ path_umount backport applied"
          else
            echo "::warning::path_umount backport had rejects (might already be in tree):"
            find . -name "*.rej" 2>/dev/null | head -5
            # Don't exit - Kbuild has fallback inject for this
          fi

          echo ""
          echo "=== Verify hooks landed ==="
          for f in fs/exec.c fs/stat.c fs/open.c fs/read_write.c kernel/reboot.c drivers/input/input.c security/selinux/hooks.c; do
            if [ -f "$f" ]; then
              n=$(grep -c "ksu_handle_\|is_ksu_transition\|CONFIG_KSU" "$f" 2>/dev/null || echo 0)
              echo "  $f: $n KSU refs"
            fi
          done

          echo ""
          echo "=== fs/namespace.c path_umount check ==="
          if grep -q "^int path_umount" fs/namespace.c; then
            echo "  ✅ path_umount injected"
          else
            echo "  ⚠️  path_umount NOT FOUND — Kbuild fallback will try"
          fi

          echo ""
          echo "=== Defconfig CONFIG_KSU check ==="
          # Patch should have already added these to lavender_defconfig
          DCFG_PATH="${DCFG_PATH:-arch/arm64/configs/lavender_defconfig}"
          grep -E "CONFIG_KSU|CONFIG_KPROBES" "$DCFG_PATH" || echo "  (no KSU/KPROBES lines yet)"

      - name: Apply backslashxx minimal syscall hooks (RECOMMENDED for latest Manager)
        if: ${{ inputs.hook_strategy == 'backslashxx' && inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Strategy: backslashxx / JackA1ltman minimal syscall hooks ==="
          echo "This is the KSU-Next-dev-recommended hook method for non-GKI + latest Manager."
          echo "Source (vendored): builder/assets/syscall_hook_patches.sh"
          echo ""

          # The patch script greps drivers/kernelsu/ to decide which hooks the driver
          # actually exports. KSU-Next setup.sh usually creates this symlink; ensure it.
          if [ ! -e drivers/kernelsu ]; then
            KSU_KDIR=""
            for cand in "${KSU_DIR}/kernel" "KernelSU-Next/kernel" "KernelSU/kernel"; do
              if [ -d "$cand" ]; then KSU_KDIR="$cand"; break; fi
            done
            if [ -n "$KSU_KDIR" ]; then
              ln -sf "$(realpath --relative-to=drivers "$KSU_KDIR")" drivers/kernelsu
              echo "  Created symlink drivers/kernelsu -> $KSU_KDIR"
            else
              echo "::error::Cannot locate KSU kernel dir to symlink drivers/kernelsu"
              exit 1
            fi
          fi
          echo "  drivers/kernelsu resolves to: $(readlink -f drivers/kernelsu 2>/dev/null || echo '?')"
          echo "  KSU exported ksu_handle_* symbols:"
          grep -rho "ksu_handle_[a-z_]*" drivers/kernelsu/ 2>/dev/null | sort -u | head -30 || true
          echo ""

          # Guard: source MUST be clean (no pre-existing ksu hooks). If the branch is
          # pre-patched (manual-hook-rksu-ksun), backslashxx skips those files -> mixed/broken.
          PREEXIST=$(grep -rl "ksu_handle_execveat\|ksu_handle_faccessat" fs/ 2>/dev/null || true)
          if [ -n "$PREEXIST" ]; then
            echo "::error::Kernel source already contains KSU hooks in: $PREEXIST"
            echo "::error::Use a CLEAN branch (android-4.4-stable) with hook_strategy=backslashxx."
            exit 1
          fi

          cp "$GITHUB_WORKSPACE/builder/assets/syscall_hook_patches.sh" /tmp/syscall_hook_patches.sh
          chmod +x /tmp/syscall_hook_patches.sh
          bash /tmp/syscall_hook_patches.sh

          echo ""
          echo "=== Verify hooks landed ==="
          FAIL=0
          for f in fs/exec.c fs/open.c fs/stat.c; do
            n=$(grep -c "ksu_handle_" "$f" 2>/dev/null || echo 0)
            echo "  $f: $n ksu_handle refs"
            [ "$n" -eq 0 ] && FAIL=1
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Core hook (exec/open/stat) missing after backslashxx patch — aborting."
            exit 1
          fi
          echo "  ✅ Core syscall hooks present."

      - name: Inject MINIMAL execveat hook into clean kernel source
        if: ${{ env.KSU_HOOK_MODE == 'minimal_inject' && inputs.ksun_repo == 'rsuntk/KernelSU' && inputs.hook_strategy == 'minimal' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Strategy: inject ONLY ksu_handle_execveat hook in fs/exec.c ==="
          echo "Surface area minimal -> isolated bug surface if bootloop"
          echo ""

          if [ ! -f fs/exec.c ]; then
            echo "::error::fs/exec.c not found"; exit 1
          fi
          if grep -q "ksu_handle_execveat" fs/exec.c; then
            echo "  ⚠️  hook already present, skipping"
            exit 0
          fi

          # Detect target function name
          if grep -q "^static int do_execveat_common(int fd, struct filename" fs/exec.c; then
            TGT="do_execveat_common"
          elif grep -q "^static int __do_execve_file(int fd, struct filename" fs/exec.c; then
            TGT="__do_execve_file"
          else
            echo "::error::Cannot find execveat function in fs/exec.c"
            grep -n "^static int.*int fd, struct filename" fs/exec.c | head -5
            exit 1
          fi
          echo "  Target function: ${TGT}"

          # Use awk for reliable multi-line injection (no python heredoc indent issues)
          cp fs/exec.c fs/exec.c.bak
          awk -v tgt="$TGT" '
          BEGIN {
            inserted_extern = 0
            after_func_sig = 0
            inserted_hook = 0
            in_includes = 1
            last_include_line = ""
          }
          # Track end of #include block: insert extern decls after last #include
          /^#include/ {
            if (in_includes) {
              print
              last_include_line = NR
              next
            }
          }
          # First non-include line after include block
          {
            if (in_includes && last_include_line != "" && !/^#include/ && !/^[[:space:]]*$/) {
              # Print extern decls
              print ""
              print "// KSU manual hook (minimal injection)"
              print "extern bool ksu_execveat_hook __read_mostly;"
              print "extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,"
              print "                                void *envp, int *flags);"
              print "extern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr,"
              print "                                         void *argv, void *envp, int *flags);"
              print ""
              in_includes = 0
              inserted_extern = 1
            }
          }
          # Detect target function start (multi-line signature)
          $0 ~ ("^static int " tgt "\\(int fd, struct filename") {
            print
            after_func_sig = 1
            next
          }
          # After function signature, find opening brace alone on line
          after_func_sig && /^\{$/ {
            print
            print "\tif (likely(ksu_execveat_hook))"
            print "\t\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            print "\telse"
            print "\t\tksu_handle_execveat_sucompat(&fd, &filename, NULL, NULL, NULL);"
            after_func_sig = 0
            inserted_hook = 1
            next
          }
          { print }
          END {
            if (!inserted_extern) {
              print "AWK: extern not inserted (in_includes=" in_includes ", last_inc=" last_include_line ")" > "/dev/stderr"
              exit 1
            }
            if (!inserted_hook) {
              print "AWK: hook call not inserted" > "/dev/stderr"
              exit 1
            }
          }
          ' fs/exec.c.bak > fs/exec.c

          if [ $? -ne 0 ]; then
            echo "::error::awk injection failed; restoring backup"
            mv fs/exec.c.bak fs/exec.c
            exit 1
          fi

          echo ""
          echo "=== Verification ==="
          if grep -q "ksu_handle_execveat" fs/exec.c; then
            echo "  ✅ Hook injection successful"
            echo ""
            echo "  --- extern decls ---"
            grep -n "extern.*ksu_handle_execveat\|extern bool ksu_execveat_hook" fs/exec.c
            echo ""
            echo "  --- call site ---"
            grep -n -B1 -A1 "ksu_handle_execveat(&fd" fs/exec.c | head -10
          else
            echo "::error::Hook injection failed (no marker in output)"
            mv fs/exec.c.bak fs/exec.c
            exit 1
          fi
          rm -f fs/exec.c.bak

      - name: Inject FULL multi-hook (5 hooks compatible with rsuntk modern manager)
        if: ${{ env.KSU_HOOK_MODE == 'minimal_inject' && inputs.hook_strategy == 'full' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Strategy: inject FULL hooks for rsuntk modern manager compat ==="
          echo "Hooks: ksu_handle_execveat, ksu_handle_stat, ksu_handle_faccessat, ksu_handle_vfs_read, ksu_handle_input_handle_event"
          echo ""

          # ===== HOOK 1: execveat (fs/exec.c) =====
          if [ ! -f fs/exec.c ]; then
            echo "::error::fs/exec.c not found"; exit 1
          fi
          if grep -q "ksu_handle_execveat" fs/exec.c; then
            echo "  ⚠️  exec.c hook already present, skipping"
          else
            if grep -q "^static int do_execveat_common(int fd, struct filename" fs/exec.c; then
              TGT="do_execveat_common"
            elif grep -q "^static int __do_execve_file(int fd, struct filename" fs/exec.c; then
              TGT="__do_execve_file"
            else
              echo "::error::Cannot find execveat function in fs/exec.c"; exit 1
            fi
            echo "  [exec.c] target: ${TGT}"
            cp fs/exec.c fs/exec.c.bak
            awk -v tgt="$TGT" '
            BEGIN { in_includes=1; last_include_line=""; after_func_sig=0 }
            /^#include/ { if (in_includes) { print; last_include_line=NR; next } }
            { if (in_includes && last_include_line!="" && !/^#include/ && !/^[[:space:]]*$/) {
                print ""
                print "// KSU manual hook (full multi-hook injection)"
                print "extern bool ksu_execveat_hook __read_mostly;"
                print "extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);"
                print "extern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);"
                print ""
                in_includes=0
            } }
            $0 ~ ("^static int " tgt "\\(int fd, struct filename") { print; after_func_sig=1; next }
            after_func_sig && /^\{$/ {
                print
                print "\tif (likely(ksu_execveat_hook))"
                print "\t\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
                print "\telse"
                print "\t\tksu_handle_execveat_sucompat(&fd, &filename, NULL, NULL, NULL);"
                after_func_sig=0
                next
            }
            { print }
            ' fs/exec.c.bak > fs/exec.c
            grep -q "ksu_handle_execveat" fs/exec.c || { mv fs/exec.c.bak fs/exec.c; echo "::error::exec.c injection failed"; exit 1; }
            rm -f fs/exec.c.bak
            echo "  ✅ fs/exec.c patched"
          fi

          # ===== HOOK 2: stat (fs/stat.c) - for vfs_statx callsite =====
          if [ -f fs/stat.c ] && ! grep -q "ksu_handle_stat" fs/stat.c; then
            echo "  [stat.c] injecting hook..."
            cp fs/stat.c fs/stat.c.bak
            # Find vfs_statx() function and inject hook at top
            awk '
            BEGIN { in_includes=1; last_include_line=""; injected_extern=0; injected_hook=0 }
            /^#include/ { if (in_includes) { print; last_include_line=NR; next } }
            { if (in_includes && last_include_line!="" && !/^#include/ && !/^[[:space:]]*$/) {
                print ""
                print "// KSU manual hook"
                print "extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);"
                print ""
                in_includes=0
                injected_extern=1
            } }
            # Match start of vfs_fstatat/vfs_statx function
            /^int vfs_fstatat\(int dfd, const char __user \*filename/ ||
            /^static int vfs_statx\(int dfd, const char __user \*filename/ ||
            /^SYSCALL_DEFINE4\(newfstatat,/ {
                print
                in_target_func=1
                next
            }
            in_target_func && /^\{$/ {
                print
                print "\tksu_handle_stat(&dfd, &filename, &flag);"
                in_target_func=0
                injected_hook=1
                next
            }
            { print }
            END {
                if (!injected_extern) print "  WARN: stat.c extern not injected" > "/dev/stderr"
                if (!injected_hook) print "  WARN: stat.c hook call not injected (function pattern not matched)" > "/dev/stderr"
            }
            ' fs/stat.c.bak > fs/stat.c
            if grep -q "ksu_handle_stat" fs/stat.c; then
              echo "  ✅ fs/stat.c patched"
            else
              echo "  ⚠️  fs/stat.c hook injection had warnings, restoring backup"
              mv fs/stat.c.bak fs/stat.c
            fi
            rm -f fs/stat.c.bak
          fi

          # ===== HOOK 3: faccessat (fs/open.c) =====
          if [ -f fs/open.c ] && ! grep -q "ksu_handle_faccessat" fs/open.c; then
            echo "  [open.c] injecting faccessat hook..."
            cp fs/open.c fs/open.c.bak
            awk '
            BEGIN { in_includes=1; last_include_line="" }
            /^#include/ { if (in_includes) { print; last_include_line=NR; next } }
            { if (in_includes && last_include_line!="" && !/^#include/ && !/^[[:space:]]*$/) {
                print ""
                print "// KSU manual hook"
                print "extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);"
                print ""
                in_includes=0
            } }
            /^SYSCALL_DEFINE3\(faccessat,/ ||
            /^long do_faccessat\(int dfd, const char __user \*filename/ {
                print
                in_target_func=1
                next
            }
            in_target_func && /^\{$/ {
                print
                print "\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
                in_target_func=0
                next
            }
            { print }
            ' fs/open.c.bak > fs/open.c
            if grep -q "ksu_handle_faccessat" fs/open.c; then
              echo "  ✅ fs/open.c patched"
            else
              echo "  ⚠️  fs/open.c skipped (pattern no match)"
              mv fs/open.c.bak fs/open.c
            fi
            rm -f fs/open.c.bak
          fi

          # ===== HOOK 4: sys_reboot (kernel/reboot.c) - REQUIRED by KSUN-Next legacy Kbuild check =====
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            echo "  [reboot.c] injecting sys_reboot hook (KSUN-Next requirement)..."
            cp kernel/reboot.c kernel/reboot.c.bak
            awk '
            BEGIN { in_includes=1; last_include_line="" }
            /^#include/ { if (in_includes) { print; last_include_line=NR; next } }
            { if (in_includes && last_include_line!="" && !/^#include/ && !/^[[:space:]]*$/) {
                print ""
                print "// KSU manual hook"
                print "extern int ksu_handle_sys_reboot(int *magic1, int *magic2, unsigned int *cmd, void __user **arg);"
                print ""
                in_includes=0
            } }
            /^SYSCALL_DEFINE4\(reboot,/ {
                print
                in_target_func=1
                next
            }
            in_target_func && /^\{$/ {
                print
                print "\tksu_handle_sys_reboot(&magic1, &magic2, &cmd, &arg);"
                in_target_func=0
                next
            }
            { print }
            ' kernel/reboot.c.bak > kernel/reboot.c
            if grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
              echo "  ✅ kernel/reboot.c patched"
            else
              echo "  ⚠️  kernel/reboot.c hook injection failed (pattern no match)"
              mv kernel/reboot.c.bak kernel/reboot.c
            fi
            rm -f kernel/reboot.c.bak
          fi

          # ===== KSU_NEXT BACKPORT: path_umount (KSUN-Next requires this for 4.4) =====
          # Kbuild auto-patch fails on 4.4 because pattern `^static bool is_mnt_ns_file` not matched.
          # We manually inject path_umount + can_umount via printf (avoid YAML heredoc issue).
          if [ -f fs/namespace.c ] && ! grep -q "^int path_umount" fs/namespace.c; then
            echo "  [namespace.c] injecting path_umount/can_umount backport..."
            {
              printf '\n'
              printf '/* KSU_NEXT: backport for path_umount (required by KSUN-Next driver) */\n'
              printf 'static int can_umount_ksu(const struct path *path, int flags)\n'
              printf '{\n'
              printf '\tstruct mount *mnt = real_mount(path->mnt);\n'
              printf '\tif (flags & ~(MNT_FORCE | MNT_DETACH | MNT_EXPIRE | UMOUNT_NOFOLLOW))\n'
              printf '\t\treturn -EINVAL;\n'
              printf '\tif (!may_mount())\n'
              printf '\t\treturn -EPERM;\n'
              printf '\tif (path->dentry != path->mnt->mnt_root)\n'
              printf '\t\treturn -EINVAL;\n'
              printf '\tif (!check_mnt(mnt))\n'
              printf '\t\treturn -EINVAL;\n'
              printf '\tif (mnt->mnt.mnt_flags & MNT_LOCKED)\n'
              printf '\t\treturn -EINVAL;\n'
              printf '\tif (flags & MNT_FORCE && !capable(CAP_SYS_ADMIN))\n'
              printf '\t\treturn -EPERM;\n'
              printf '\treturn 0;\n'
              printf '}\n'
              printf '\n'
              printf 'int path_umount(struct path *path, int flags)\n'
              printf '{\n'
              printf '\tstruct mount *mnt = real_mount(path->mnt);\n'
              printf '\tint ret;\n'
              printf '\tret = can_umount_ksu(path, flags);\n'
              printf '\tif (!ret)\n'
              printf '\t\tret = do_umount(mnt, flags);\n'
              printf '\tdput(path->dentry);\n'
              printf '\tmntput_no_expire(mnt);\n'
              printf '\treturn ret;\n'
              printf '}\n'
            } >> fs/namespace.c
            # Add forward declaration to fs/internal.h
            if [ -f fs/internal.h ] && ! grep -q "int path_umount" fs/internal.h; then
              printf '\n/* KSU_NEXT: forward decl */\nint path_umount(struct path *path, int flags);\n' >> fs/internal.h
              echo "  ✅ fs/internal.h forward decl added"
            fi
            echo "  ✅ fs/namespace.c path_umount backport injected"
          fi

          # ===== Verification =====
          echo ""
          echo "=== Verification ==="
          for f in fs/exec.c fs/stat.c fs/open.c kernel/reboot.c; do
            if [ -f "$f" ]; then
              n=$(grep -c "ksu_handle_" "$f" || echo 0)
              echo "  $f: $n ksu_handle_ refs"
            fi
          done

      - name: Clone SUSFS
        if: ${{ inputs.enable_susfs == 'true' && inputs.pre_patched_kernel != 'true' }}
        run: |
          git clone --depth=1 -b "${{ inputs.susfs_branch }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          cd susfs4ksu
          echo "SUSFS_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Apply SUSFS patches
        if: ${{ inputs.enable_susfs == 'true' && inputs.pre_patched_kernel != 'true' }}
        run: |
          set -e
          cd kernel_source

          # 1) Copy SUSFS kernel sources into kernel tree
          cp ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          # 2) Apply kernel-side patch
          KPATCH=$(ls ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-*.patch 2>/dev/null | head -n1)
          if [ -n "$KPATCH" ]; then
            echo "Applying kernel patch: $KPATCH"
            patch -p1 --forward --fuzz=3 < "$KPATCH" || \
              echo "::warning::Kernel SUSFS patch had rejects. Continuing - check *.rej files."
          fi

          # 3) Apply KSU-Next side patch
          if [ -d KernelSU-Next ]; then
            cd KernelSU-Next
            KSU_PATCH=$(ls ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch 2>/dev/null || true)
            if [ -n "$KSU_PATCH" ]; then
              echo "Applying KSU-Next SUSFS patch: $KSU_PATCH"
              patch -p1 --forward --fuzz=3 < "$KSU_PATCH" || \
                echo "::warning::KSU-Next SUSFS patch had rejects."
            fi
            cd ..
          fi

      - name: Inject defconfig flags
        working-directory: kernel_source
        run: |
          # Strip existing localversion-* files (st74, san, halfelf, etc) to prevent
          # them appending to our CONFIG_LOCALVERSION
          echo "=== Strip pre-existing localversion files ==="
          ls -la localversion* 2>/dev/null || echo "  (none)"
          rm -f localversion-*
          echo "  After cleanup:"
          ls -la localversion* 2>/dev/null || echo "  (clean)"
          echo ""

          {
            echo ""
            echo "# === KernelSU ==="
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_DEBUG=n"
            echo "CONFIG_OVERLAY_FS=y"
            echo ""
            echo "# === Stock-like kernel branding (stealth) ==="
            echo "CONFIG_LOCALVERSION=\"-perf\""
            echo "# CONFIG_LOCALVERSION_AUTO is not set"
          } >> "${DCFG_PATH}"

          if [ "${KSU_HOOK_MODE}" = "auto" ]; then
            echo "rsuntk/KernelSU - no hook config needed (auto-detected at compile time)"
          elif [ "${KSU_HOOK_MODE}" = "kprobes" ]; then
            {
              echo "CONFIG_KPROBES=y"
              echo "CONFIG_KRETPROBES=y"
              echo "CONFIG_HAVE_KPROBES=y"
              echo "CONFIG_HAVE_KRETPROBES=y"
              echo "CONFIG_HAVE_SYSCALL_TRACEPOINTS=y"
              echo "CONFIG_KSU_KPROBES_HOOK=y"
            } >> "${DCFG_PATH}"
            echo "Using KPROBES hooks"
          else
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "${DCFG_PATH}"
            echo "Using MANUAL hooks (mode: ${KSU_HOOK_MODE})"
          fi

          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            {
              echo ""
              echo "# === SUSFS ==="
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              # CONFIG_KSU_SUSFS_SUS_SU intentionally disabled (unstable on 4.4)
            } >> "${DCFG_PATH}"
          fi

      - name: Force KSU_VERSION via Kbuild override (fix version=0 bug)
        if: ${{ contains(inputs.ksun_repo, 'KernelSU-Next') && inputs.ksun_branch != 'next' && inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          # Setup script clone KSU but doesn't preserve .git context properly.
          # Kbuild fallback: KSU_VERSION_FALLBACK := 1, but actual driver returns 0.
          # We force it by appending ccflags directly to KernelSU-Next/Kbuild.
          
          KBUILD_FILE="${KSU_DIR}/kernel/Kbuild"
          if [ ! -f "$KBUILD_FILE" ]; then
            echo "::warning::$KBUILD_FILE not found, trying alternative path"
            KBUILD_FILE="${KSU_DIR}/Kbuild"
          fi
          
          if [ -f "$KBUILD_FILE" ]; then
            # Read the actual git tag/commit count from KSU repo
            cd "${KSU_DIR}"
            KSU_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v3.3.0")
            KSU_COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "1000")
            cd ..

            # Auto-detect KSU_VERSION from git commit count.
            # This ensures kernel driver version matches whatever Manager APK
            # the user installs (v3.2.0=33129, v3.3.0=~33400+, etc).
            # Shamiko and strict modules check: kernel KSU_VERSION == ksud version.
            FORCED_VERSION=${KSU_COMMIT_COUNT}
            # Compatibility floor: KSU-Next Manager v3.3.0 = versionCode 33214.
            # If the (pinned/legacy) driver reports a lower commit count, spoof up
            # to 33214 so the LATEST manager accepts the driver ("Working").
            MGR_MIN=33214
            if ! echo "$FORCED_VERSION" | grep -Eq '^[0-9]+$'; then FORCED_VERSION=$MGR_MIN; fi
            if [ "$FORCED_VERSION" -lt "$MGR_MIN" ]; then
              echo "  Driver version $FORCED_VERSION < manager floor $MGR_MIN -> spoofing to $MGR_MIN"
              FORCED_VERSION=$MGR_MIN
            fi
            echo "  KSU_VERSION=$FORCED_VERSION (tag=$KSU_TAG, commits=$KSU_COMMIT_COUNT, mgr_floor=$MGR_MIN)"
            echo "  Appending overrides to $KBUILD_FILE"
            
            # Append at the end of Kbuild to override fallback
            {
              echo ""
              echo "# === Workflow forced override (fix git context loss) ==="
              echo "ccflags-y += -UKSU_VERSION"
              echo "ccflags-y += -DKSU_VERSION=$FORCED_VERSION"
              echo "ccflags-y += -UKSU_VERSION_TAG"
              echo "ccflags-y += -DKSU_VERSION_TAG=\\\"$KSU_TAG\\\""
            } >> "$KBUILD_FILE"
            
            echo "  ✅ KSU_VERSION forced to $FORCED_VERSION"
            echo "FORCED_KSU_VERSION=$FORCED_VERSION" >> $GITHUB_ENV
            
            # ===== ALSO patch supercall.c: ksuver_override default =====
            # Driver has `uint32_t ksuver_override = 0;` global.
            # Zygisk loaders read this var via supercall protocol.
            # Force default value to FORCED_VERSION instead of 0.
            SUPERCALL_FILE="${KSU_DIR}/kernel/supercall/supercall.c"
            if [ -f "$SUPERCALL_FILE" ]; then
              if grep -q "uint32_t ksuver_override = 0;" "$SUPERCALL_FILE"; then
                sed -i "s|uint32_t ksuver_override = 0;|uint32_t ksuver_override = ${FORCED_VERSION};|" "$SUPERCALL_FILE"
                echo "  ✅ ksuver_override default patched in supercall.c (version=${FORCED_VERSION})"
                grep "uint32_t ksuver_override" "$SUPERCALL_FILE"
              else
                echo "  ⚠️  ksuver_override pattern not found in supercall.c"
                grep -n "ksuver_override" "$SUPERCALL_FILE" | head -5
              fi
            else
              echo "  ⚠️  supercall.c not found, skipping ksuver_override patch"
            fi
          fi

      - name: Patch KSU UAPI version for Manager v3.3.0 compat
        if: ${{ inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Patch UAPI version into KSU source ==="

          KSU_KERNEL_DIR=""
          for cand in "${KSU_DIR}/kernel" "drivers/kernelsu"; do
            if [ -d "$cand" ]; then KSU_KERNEL_DIR="$cand"; break; fi
          done
          if [ -z "$KSU_KERNEL_DIR" ]; then
            echo "  ⚠️  KSU kernel dir not found — skipping"
            exit 0
          fi

          export UAPI_HEADER=""
          for h in "${KSU_DIR}/uapi/supercall.h" "uapi/supercall.h" "${KSU_KERNEL_DIR}/include/uapi/supercall.h"; do
            if [ -f "$h" ]; then UAPI_HEADER="$h"; break; fi
          done

          export DISPATCH=""
          for d in "${KSU_KERNEL_DIR}/supercall/dispatch.c" "${KSU_KERNEL_DIR}/dispatch.c"; do
            if [ -f "$d" ]; then DISPATCH="$d"; break; fi
          done

          python3 << 'PYEOF'
          import sys, re, os

          uapi = os.environ.get('UAPI_HEADER', '')
          dispatch = os.environ.get('DISPATCH', '')

          # ============ PATCH supercall.h ============
          if uapi and os.path.isfile(uapi):
              with open(uapi, 'r') as f:
                  content = f.read()

              modified = False

              # 1. Add KERNEL_SU_UAPI_VERSION constant
              if 'KERNEL_SU_UAPI_VERSION' not in content:
                  content = content.replace(
                      '#define __KSU_UAPI_SUPERCALL_H',
                      '#define __KSU_UAPI_SUPERCALL_H\n\n// UAPI version for Manager compat\nstatic const __u32 KERNEL_SU_UAPI_VERSION = 2;',
                  )
                  print(f'  ✅ Added KERNEL_SU_UAPI_VERSION=2 to {uapi}')
                  modified = True

              # 2. Add uapi_version field to ksu_get_info_cmd
              if 'uapi_version' not in content:
                  content = content.replace(
                      '__u32 features; /* Output: max feature ID supported */',
                      '__u32 features; /* Output: max feature ID supported */\n    __u32 uapi_version; /* Output: KERNEL_SU_UAPI_VERSION */',
                  )
                  print(f'  ✅ Added uapi_version field to ksu_get_info_cmd')
                  modified = True

              # 3. Fix KSU_IOCTL_GET_INFO to use _IOR with struct size
              #    Old: _IOC(_IOC_READ, 'K', 2, 0) — size=0
              #    New: _IOR('K', 2, struct ksu_get_info_cmd) — size=16
              #    Manager v3.3.0 sends the new one, so we MUST match.
              old_get_info = "_IOC(_IOC_READ, 'K', 2, 0)"
              new_get_info = "_IOR('K', 2, struct ksu_get_info_cmd)"
              if old_get_info in content and new_get_info not in content:
                  # Rename old to LEGACY, add new as primary
                  content = content.replace(
                      "static const __u32 KSU_IOCTL_GET_INFO = " + old_get_info + ";",
                      "static const __u32 KSU_IOCTL_GET_INFO = " + new_get_info + ";\n"
                      "/* Legacy ioctl (size=0) for old managers */\n"
                      "static const __u32 KSU_IOCTL_GET_INFO_LEGACY = " + old_get_info + ";",
                  )
                  print(f'  ✅ Updated KSU_IOCTL_GET_INFO to use _IOR with struct size')
                  modified = True

              if modified:
                  with open(uapi, 'w') as f:
                      f.write(content)
              else:
                  print('  Header already fully patched')
          else:
              print(f'  ⚠️  uapi header not found: {uapi}')

          # ============ PATCH dispatch.c ============
          if dispatch and os.path.isfile(dispatch):
              with open(dispatch, 'r') as f:
                  content = f.read()

              modified = False

              # 1. Add uapi_version assignment in do_get_info
              if 'uapi_version' not in content:
                  content = content.replace(
                      'cmd.features = KSU_FEATURE_MAX;',
                      'cmd.features = KSU_FEATURE_MAX;\n\tcmd.uapi_version = KERNEL_SU_UAPI_VERSION;',
                  )
                  print(f'  ✅ Added uapi_version assignment in do_get_info')
                  modified = True

              # 2. Register legacy ioctl handler so both old+new ioctl numbers work
              if 'KSU_IOCTL_GET_INFO_LEGACY' not in content:
                  # Add legacy handler entry right after the GET_INFO entry
                  old_entry = (
                      '{\n'
                      '        .cmd = KSU_IOCTL_GET_INFO,\n'
                      '        .name = "GET_INFO",\n'
                      '        .handler = do_get_info,\n'
                      '        .perm_check = always_allow\n'
                      '    },'
                  )
                  new_entry = (
                      '{\n'
                      '        .cmd = KSU_IOCTL_GET_INFO,\n'
                      '        .name = "GET_INFO",\n'
                      '        .handler = do_get_info,\n'
                      '        .perm_check = always_allow\n'
                      '    },\n'
                      '    {\n'
                      '        .cmd = KSU_IOCTL_GET_INFO_LEGACY,\n'
                      '        .name = "GET_INFO_LEGACY",\n'
                      '        .handler = do_get_info,\n'
                      '        .perm_check = always_allow\n'
                      '    },'
                  )
                  if old_entry in content:
                      content = content.replace(old_entry, new_entry)
                      print(f'  ✅ Added KSU_IOCTL_GET_INFO_LEGACY handler (exact match)')
                      modified = True
                  else:
                      # Try tab-indented variant
                      old_tab = (
                          '{\n'
                          '\t\t.cmd = KSU_IOCTL_GET_INFO,\n'
                          '\t\t.name = "GET_INFO",\n'
                          '\t\t.handler = do_get_info,\n'
                          '\t\t.perm_check = always_allow\n'
                          '\t},'
                      )
                      new_tab = (
                          '{\n'
                          '\t\t.cmd = KSU_IOCTL_GET_INFO,\n'
                          '\t\t.name = "GET_INFO",\n'
                          '\t\t.handler = do_get_info,\n'
                          '\t\t.perm_check = always_allow\n'
                          '\t},\n'
                          '\t{\n'
                          '\t\t.cmd = KSU_IOCTL_GET_INFO_LEGACY,\n'
                          '\t\t.name = "GET_INFO_LEGACY",\n'
                          '\t\t.handler = do_get_info,\n'
                          '\t\t.perm_check = always_allow\n'
                          '\t},'
                      )
                      if old_tab in content:
                          content = content.replace(old_tab, new_tab)
                          print(f'  ✅ Added KSU_IOCTL_GET_INFO_LEGACY handler (tab match)')
                          modified = True
                      else:
                          # Fallback: just insert line after GET_INFO handler via regex
                          import re
                          pattern = r'(\.cmd\s*=\s*KSU_IOCTL_GET_INFO\b.*?\.perm_check\s*=\s*always_allow\s*\n\s*\},)'
                          repl = (r'\1\n    {\n        .cmd = KSU_IOCTL_GET_INFO_LEGACY,\n'
                                  r'        .name = "GET_INFO_LEGACY",\n'
                                  r'        .handler = do_get_info,\n'
                                  r'        .perm_check = always_allow\n    },')
                          new_content = re.sub(pattern, repl, content, count=1, flags=re.DOTALL)
                          if new_content != content:
                              content = new_content
                              print(f'  ✅ Added KSU_IOCTL_GET_INFO_LEGACY handler (regex)')
                              modified = True
                          else:
                              print(f'  ⚠️  Could not find GET_INFO handler entry to duplicate')

              if modified:
                  with open(dispatch, 'w') as f:
                      f.write(content)
              else:
                  print('  dispatch.c already fully patched')
          else:
              print(f'  ⚠️  dispatch.c not found: {dispatch}')
          PYEOF

          echo "  === UAPI patch complete ==="

      - name: Fix KSU-Next SELinux compat for kernel 4.4
        if: ${{ inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Fix selinux_state references for kernel 4.4 ==="
          # Kernel 4.4 does NOT have 'struct selinux_state' (introduced 4.19+).
          # KSU-Next legacy selinux.c uses selinux_kernel_status_page(&selinux_state)
          # but on 4.4 the function takes no args: selinux_kernel_status_page(void).
          # Also selinux_is_initialized(&selinux_state) on 4.4 is just selinux_initialized.

          KV_MAJOR=$(echo "${KERNEL_VERSION}" | cut -d. -f1)
          KV_MINOR=$(echo "${KERNEL_VERSION}" | cut -d. -f2)
          echo "  Kernel: ${KERNEL_VERSION} (major=${KV_MAJOR}, minor=${KV_MINOR})"

          # Only apply fix for kernel < 4.19
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 19 ]); then
            echo "  Kernel < 4.19 detected — applying selinux compat patches"

            # Find KSU selinux files
            KSU_SELINUX=""
            for cand in "${KSU_DIR}/kernel/selinux/selinux.c" "drivers/kernelsu/selinux/selinux.c"; do
              if [ -f "$cand" ]; then KSU_SELINUX="$cand"; break; fi
            done

            if [ -z "$KSU_SELINUX" ]; then
              echo "  ⚠️  KSU selinux.c not found — skipping"
            else
              echo "  Patching: $KSU_SELINUX"

              # Fix 1: selinux_kernel_status_page(&selinux_state) -> selinux_kernel_status_page()
              if grep -q 'selinux_kernel_status_page(&selinux_state)' "$KSU_SELINUX"; then
                sed -i 's/selinux_kernel_status_page(&selinux_state)/selinux_kernel_status_page()/g' "$KSU_SELINUX"
                echo "  ✅ Fixed selinux_kernel_status_page (removed &selinux_state arg)"
              fi

              # Fix 2: selinux_is_initialized(&selinux_state) -> selinux_initialized
              if grep -q 'selinux_is_initialized(&selinux_state)' "$KSU_SELINUX"; then
                sed -i 's/selinux_is_initialized(&selinux_state)/selinux_initialized/g' "$KSU_SELINUX"
                echo "  ✅ Fixed selinux_is_initialized -> selinux_initialized"
              fi

              # Fix 3: &selinux_state remaining references (other functions)
              if grep -q '&selinux_state' "$KSU_SELINUX"; then
                echo "  ⚠️  Remaining &selinux_state references:"
                grep -n '&selinux_state' "$KSU_SELINUX"
                # Generic fix: wrap with version guard
                sed -i '1i\/* KSU 4.4 compat: selinux_state does not exist */\n#if LINUX_VERSION_CODE < KERNEL_VERSION(4, 19, 0)\nstruct { int initialized; } selinux_state = { .initialized = 1 };\n#endif' "$KSU_SELINUX"
                echo "  ✅ Injected dummy selinux_state struct for 4.4 compat"
              fi

              echo ""
              echo "  === Verification ==="
              grep -n "selinux_state\|selinux_kernel_status_page\|selinux_is_initialized\|selinux_initialized" "$KSU_SELINUX" | head -15
            fi
          else
            echo "  Kernel >= 4.19 — no selinux compat fix needed"
          fi

      - name: Fix KSU-Next header compat for kernel 4.4
        if: ${{ inputs.pre_patched_kernel != 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Fix KSU-Next compat for kernel < 4.16 ==="
          KV_MAJOR=$(echo "${KERNEL_VERSION}" | cut -d. -f1)
          KV_MINOR=$(echo "${KERNEL_VERSION}" | cut -d. -f2)

          KSU_KERNEL_DIR=""
          for cand in "${KSU_DIR}/kernel" "drivers/kernelsu"; do
            if [ -d "$cand" ]; then KSU_KERNEL_DIR="$cand"; break; fi
          done

          if [ -z "$KSU_KERNEL_DIR" ]; then
            echo "  ⚠️  KSU kernel dir not found — skipping"
            exit 0
          fi

          echo "  KSU dir: $KSU_KERNEL_DIR"
          echo "  Kernel: ${KERNEL_VERSION} (major=${KV_MAJOR}, minor=${KV_MINOR})"
          FIXES=0

          # === Fix 1: compiler_types.h (introduced 4.14) ===
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 14 ]); then
            echo ""
            echo "  --- Fix 1: compiler_types.h → compiler.h ---"
            while IFS= read -r f; do
              sed -i 's|#include <linux/compiler_types.h>|#include <linux/compiler.h>|g' "$f"
              echo "    ✅ $f"
              FIXES=$((FIXES + 1))
            done < <(grep -rl 'linux/compiler_types.h' "$KSU_KERNEL_DIR" 2>/dev/null || true)
          fi

          # === Fix 2: __poll_t and EPOLL* (introduced 4.16) ===
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 16 ]); then
            echo ""
            echo "  --- Fix 2: __poll_t / EPOLL* compat (kernel < 4.16) ---"

            # Create a compat header that maps new poll types to old ones
            COMPAT_HEADER="$KSU_KERNEL_DIR/ksu_compat_poll.h"
            cat > "$COMPAT_HEADER" << 'COMPAT_EOF'
          #ifndef _KSU_COMPAT_POLL_H
          #define _KSU_COMPAT_POLL_H

          #include <linux/version.h>

          #if LINUX_VERSION_CODE < KERNEL_VERSION(4, 16, 0)
          /*
           * Kernel 4.16 introduced __poll_t and EPOLL* constants.
           * For older kernels, map them back to the POLL* equivalents.
           */
          #include <linux/poll.h>
          #include <asm/poll.h>

          typedef unsigned int __poll_t;

          #ifndef EPOLLIN
          #define EPOLLIN      POLLIN
          #endif
          #ifndef EPOLLOUT
          #define EPOLLOUT     POLLOUT
          #endif
          #ifndef EPOLLHUP
          #define EPOLLHUP     POLLHUP
          #endif
          #ifndef EPOLLERR
          #define EPOLLERR     POLLERR
          #endif
          #ifndef EPOLLRDNORM
          #define EPOLLRDNORM  POLLRDNORM
          #endif
          #ifndef EPOLLWRNORM
          #define EPOLLWRNORM  POLLWRNORM
          #endif
          #ifndef EPOLLRDBAND
          #define EPOLLRDBAND  POLLRDBAND
          #endif
          #ifndef EPOLLWRBAND
          #define EPOLLWRBAND  POLLWRBAND
          #endif

          #endif /* LINUX_VERSION_CODE < 4.16.0 */
          #endif /* _KSU_COMPAT_POLL_H */
          COMPAT_EOF
            # Fix indentation in generated file
            sed -i 's/^          //' "$COMPAT_HEADER"
            echo "    ✅ Created $COMPAT_HEADER"

            # Find all .c and .h files that use __poll_t or EPOLL*
            while IFS= read -r f; do
              # Skip the compat header itself
              [ "$f" = "$COMPAT_HEADER" ] && continue
              # Add include at top of file (after existing includes)
              if ! grep -q 'ksu_compat_poll.h' "$f"; then
                sed -i '1i\#include "ksu_compat_poll.h"' "$f"
                echo "    ✅ Injected compat include: $f"
                FIXES=$((FIXES + 1))
              fi
            done < <(grep -rlE '__poll_t|EPOLLIN|EPOLLOUT|EPOLLHUP|EPOLLERR|EPOLLRDNORM|EPOLLWRNORM' "$KSU_KERNEL_DIR" 2>/dev/null || true)
          fi

          # === Fix 3: struct wait_queue_head → wait_queue_head_t (older naming) ===
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 13 ]); then
            echo ""
            echo "  --- Fix 3: wait_queue_head struct compat ---"
            while IFS= read -r f; do
              # Only fix if struct wait_queue_head is used WITHOUT _t suffix
              if grep -qP 'struct wait_queue_head[^_]' "$f"; then
                sed -i 's/struct wait_queue_head\b/wait_queue_head_t/g' "$f"
                echo "    ✅ Fixed wait_queue_head: $f"
                FIXES=$((FIXES + 1))
              fi
            done < <(grep -rlP 'struct wait_queue_head[^_]' "$KSU_KERNEL_DIR" 2>/dev/null || true)
          fi

          # === Fix 4: split sched headers (kernel 4.11 split linux/sched.h) ===
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 11 ]); then
            echo ""
            echo "  --- Fix 4: sched header split compat (kernel < 4.11) ---"

            # These headers were split out from linux/sched.h in 4.11:
            # linux/sched/signal.h, linux/sched/mm.h, linux/sched/task.h,
            # linux/sched/clock.h, linux/sched/types.h, etc.
            SCHED_HEADERS="linux/sched/signal.h linux/sched/mm.h linux/sched/task.h linux/sched/clock.h linux/sched/types.h linux/sched/task_stack.h linux/sched/cputime.h"

            for hdr in $SCHED_HEADERS; do
              while IFS= read -r f; do
                sed -i "s|#include <${hdr}>|#include <linux/sched.h>|g" "$f"
                echo "    ✅ $f: ${hdr} → linux/sched.h"
                FIXES=$((FIXES + 1))
              done < <(grep -rl "${hdr}" "$KSU_KERNEL_DIR" 2>/dev/null || true)
            done
          fi

          # === Fix 5: force-include compat header for KSU driver (root-cause fix) ===
          # KSU-Next legacy driver uses kernel macros/functions newer than 4.4
          # (in_compat_syscall 4.6, ALIGN_DOWN 4.16, etc). Instead of whack-a-mole,
          # force-include ONE compat header into every KSU compilation unit via
          # subdir-ccflags-y -include (covers all subdirs: sulog/, feature/, etc).
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 16 ]); then
            echo ""
            echo "  --- Fix 5: force-include ksu_compat44.h into KSU driver ---"
            COMPAT44="$KSU_KERNEL_DIR/ksu_compat44.h"
            cat > "$COMPAT44" << 'C44_EOF'
          #ifndef _KSU_COMPAT44_H
          #define _KSU_COMPAT44_H
          #include <linux/version.h>
          #include <linux/kernel.h>

          /* ALIGN_DOWN: introduced 4.16 */
          #ifndef ALIGN_DOWN
          #define ALIGN_DOWN(x, a) __ALIGN_KERNEL((x) - ((a) - 1), (a))
          #endif

          /* in_compat_syscall(): introduced 4.6 (arm64 android has CONFIG_COMPAT=y) */
          #if LINUX_VERSION_CODE < KERNEL_VERSION(4, 6, 0)
          #include <linux/compat.h>
          #ifndef in_compat_syscall
          #define in_compat_syscall() is_compat_task()
          #endif
          #endif

          /* array_size / struct_size: introduced 4.16 (linux/overflow.h absent on 4.4) */
          #ifndef array_size
          #define array_size(a, b) ((a) * (b))
          #endif
          #ifndef struct_size
          #define struct_size(p, member, n) \
              (sizeof(*(p)) + (n) * sizeof(*(p)->member))
          #endif

          #endif /* _KSU_COMPAT44_H */
          C44_EOF
            sed -i 's/^          //' "$COMPAT44"
            COMPAT44_ABS="$(realpath "$COMPAT44")"
            echo "    Created $COMPAT44 (abs: $COMPAT44_ABS)"

            # Locate KSU Kbuild/Makefile and inject force-include for all subdirs
            KSU_KBUILD=""
            for cand in "$KSU_KERNEL_DIR/Kbuild" "$KSU_KERNEL_DIR/Makefile" "${KSU_DIR}/kernel/Kbuild" "drivers/kernelsu/Kbuild"; do
              if [ -f "$cand" ]; then KSU_KBUILD="$cand"; break; fi
            done
            if [ -n "$KSU_KBUILD" ]; then
              {
                echo ""
                echo "# === 4.4 compat: force-include compat header (workflow) ==="
                echo "ccflags-y += -include $COMPAT44_ABS"
                echo "subdir-ccflags-y += -include $COMPAT44_ABS"
              } >> "$KSU_KBUILD"
              echo "    ✅ Force-include appended to $KSU_KBUILD"
              FIXES=$((FIXES + 1))
            else
              echo "::warning::KSU Kbuild not found — force-include not applied"
            fi
          fi

          # === Fix 6: asm/set_memory.h (arm64 split at 4.13) ===
          # KSU-Next legacy feature/selinux_hide.c includes <asm/set_memory.h>.
          # On 4.4 set_memory_* live in <asm/cacheflush.h>. Provide a stub header
          # in the kernel tree so the include resolves for the whole build.
          if [ "$KV_MAJOR" -lt 4 ] || ([ "$KV_MAJOR" -eq 4 ] && [ "$KV_MINOR" -lt 13 ]); then
            echo ""
            echo "  --- Fix 6: asm/set_memory.h stub (kernel < 4.13) ---"
            SM_HDR="arch/arm64/include/asm/set_memory.h"
            if [ ! -f "$SM_HDR" ]; then
              cat > "$SM_HDR" << 'SM_EOF'
          #ifndef _KSU_COMPAT_ASM_SET_MEMORY_H
          #define _KSU_COMPAT_ASM_SET_MEMORY_H
          /* 4.4 compat: set_memory_* declared in asm/cacheflush.h before 4.13 split */
          #include <asm/cacheflush.h>
          #endif
          SM_EOF
              sed -i 's/^          //' "$SM_HDR"
              echo "    ✅ Created stub $SM_HDR"
              FIXES=$((FIXES + 1))
            else
              echo "    (set_memory.h already exists)"
            fi
          fi

          echo ""
          echo "  === Total fixes applied: $FIXES ==="


      - name: Patch lavender DTS fstab (non-dynamic / legacy partition)
        if: ${{ inputs.legacy_fstab == 'true' }}
        working-directory: kernel_source
        run: |
          set -e
          echo "=== Patching lavender DTS for NON-DYNAMIC (legacy) fstab ==="
          DTSI="arch/arm64/boot/dts/vendor/qcom/xiaomi/longcheer/lavender/lavender-base.dtsi"
          if [ ! -f "$DTSI" ]; then
            echo "::warning::lavender-base.dtsi not at expected path, searching..."
            DTSI=$(find arch/arm64/boot/dts -name "lavender-base.dtsi" 2>/dev/null | head -1)
            [ -z "$DTSI" ] && { echo "::error::lavender-base.dtsi not found"; exit 1; }
          fi
          echo "Found DTSI: $DTSI"
          python3 "$GITHUB_WORKSPACE/builder/assets/fstab_patch.py" "$DTSI"
          echo ""
          echo "=== After patch (fstab section) ==="
          grep -n -A20 "fstab {" "$DTSI" | head -30 || true

      - name: Build kernel
        working-directory: kernel_source
        env:
          ARCH: arm64
          SUBARCH: arm64
          KBUILD_BUILD_USER: JorianPonomaref
          KBUILD_BUILD_HOST: lavender44-actions
        run: |
          set -eo pipefail
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          echo "=== Toolchain check ==="
          which clang || { echo "::error::clang not found in PATH"; exit 1; }
          clang --version
          aarch64-linux-gnu-ld --version | head -n1
          aarch64-linux-gnu-gcc --version | head -n1
          echo ""

          MAKE_DCFG=$(basename "${DCFG_NAME}")
          # If defconfig is in vendor/ subfolder, kbuild won't find it directly
          # Copy it to root arch/arm64/configs/ so make can use it
          if echo "${DCFG_NAME}" | grep -q '^vendor/'; then
            echo "=== Defconfig in vendor/ subfolder, copy to root for make ==="
            cp "arch/arm64/configs/${DCFG_NAME}" "arch/arm64/configs/${MAKE_DCFG}"
            echo "  Copied: arch/arm64/configs/${DCFG_NAME} -> arch/arm64/configs/${MAKE_DCFG}"
          fi
          echo "=== Generating .config from ${MAKE_DCFG} ==="
          make O=out ARCH=arm64 "${MAKE_DCFG}" 2>&1 | tee -a build.log

          echo ""
          echo "=== Building kernel (Clang+GNU-LD hybrid for 4.4 compat) ==="
          echo "KernelSU repo: ${{ inputs.ksun_repo }}"
          echo "Hook mode: ${KSU_HOOK_MODE}"

          # NOTE: Kernel 4.4 doesn't play nice with ld.lld (empty built-in.o issue).
          # Use Clang for compile but GNU ld (from binutils) for link.
          # Exception: Full LTO requires ld.lld (GNU ld can't handle LTO bitcode).

          # === LTO + Polly flags ===
          EXTRA_KCFLAGS=""
          LINKER_OVERRIDE=""
          LTO_MODE="${{ inputs.enable_lto }}"
          POLLY_ENABLED="${{ inputs.enable_polly }}"

          # Use LLD (LLVM linker) for kernels that need it (4.19+ kucingoranye style)
          if [ "${{ inputs.use_llvm_linker }}" = "true" ]; then
            echo "🔗 Using LLD (LLVM linker) instead of GNU ld"
            LINKER_OVERRIDE="LD=ld.lld LLVM=1 LLVM_IAS=1"
          fi

          if [ "$LTO_MODE" = "thin" ]; then
            echo "⚡ ThinLTO enabled"
            echo "⚠️  NOTE: Kernel 4.4 requires Makefile backport for LTO. If build fails, use 'off'."
            EXTRA_KCFLAGS="$EXTRA_KCFLAGS -flto=thin -fvisibility=hidden"
            LINKER_OVERRIDE="LD=ld.lld LLVM=1 LLVM_IAS=1"
          elif [ "$LTO_MODE" = "full" ]; then
            echo "⚡ Full LTO enabled (slow build, max optimize)"
            echo "⚠️  NOTE: Kernel 4.4 requires Makefile backport for LTO. If build fails, use 'off'."
            EXTRA_KCFLAGS="$EXTRA_KCFLAGS -flto -fvisibility=hidden"
            LINKER_OVERRIDE="LD=ld.lld LLVM=1 LLVM_IAS=1"
          fi

          if [ "$POLLY_ENABLED" = "true" ]; then
            echo "⚡ LLVM Polly optimizer enabled"
            EXTRA_KCFLAGS="$EXTRA_KCFLAGS -mllvm -polly -mllvm -polly-vectorizer=stripmine -mllvm -polly-run-dce"
          fi

          if [ -n "$EXTRA_KCFLAGS" ]; then
            echo "  KCFLAGS: $EXTRA_KCFLAGS"
          fi

          # For LTO builds: need to disable host tool compilation with LTO flags
          # by building scripts separately without KCFLAGS
          if [ "$LTO_MODE" != "off" ] && [ -n "$LTO_MODE" ]; then
            echo "=== Pre-build: compile scripts without LTO ==="
            make O=out ARCH=arm64 \
              CC="ccache clang" \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              scripts 2>&1 | tee -a build.log
            echo "=== Scripts built, now building kernel with LTO ==="
          fi

          make O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            ${LINKER_OVERRIDE} \
            ${EXTRA_KCFLAGS:+KCFLAGS="$EXTRA_KCFLAGS"} \
            -j$(nproc --all) 2>&1 | tee -a build.log

          echo ""
          echo "=== Build outputs ==="
          ls -lah out/arch/arm64/boot/ || true

      - name: Verify build artifacts
        working-directory: kernel_source
        run: |
          IMAGE=""
          for cand in \
              out/arch/arm64/boot/Image.gz-dtb \
              out/arch/arm64/boot/Image-dtb \
              out/arch/arm64/boot/Image.gz \
              out/arch/arm64/boot/Image; do
            if [ -f "$cand" ]; then IMAGE="$cand"; break; fi
          done
          if [ -z "$IMAGE" ]; then
            echo "::error::No kernel image produced!"
            ls -lah out/arch/arm64/boot/ || true
            exit 1
          fi
          echo "KERNEL_IMAGE=$IMAGE" >> $GITHUB_ENV
          ls -lah out/arch/arm64/boot/

      - name: Package with AnyKernel3
        run: |
          set -e
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp builder/assets/anykernel.sh AnyKernel3/anykernel.sh

          cp "kernel_source/${KERNEL_IMAGE}" AnyKernel3/

          # Copy DTBs if present
          for f in kernel_source/out/arch/arm64/boot/dtbo.img \
                   kernel_source/out/arch/arm64/boot/dts/qcom/*.dtb; do
            [ -f "$f" ] && cp "$f" AnyKernel3/ || true
          done

          # San-Kernel style naming: C9-Kernel-<Codename>-R<Ver>-<Device>-KSUN.zip
          # Example: C9-Kernel-Phoenix-R1.0-Lavender-KSUN.zip
          DEVICE_CODENAME=$(basename "${DCFG_NAME}" | sed 's|_defconfig$||; s|-perf_defconfig$||; s|-perf$||')
          echo "DEVICE_CODENAME=${DEVICE_CODENAME}" >> $GITHUB_ENV
          # Capitalize first letter for device label (lavender -> Lavender)
          DEVICE_LABEL=$(echo "${DEVICE_CODENAME}" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')
          KERNEL_CODENAME="${{ inputs.kernel_codename }}"
          KERNEL_RELVER="${{ inputs.kernel_relver }}"
          KERNEL_CODENAME="${KERNEL_CODENAME:-Phoenix}"
          KERNEL_RELVER="${KERNEL_RELVER:-R1.0}"
          ZIPNAME="C9-Kernel-${KERNEL_CODENAME}-${KERNEL_RELVER}-${DEVICE_LABEL}-KSUN"
          if [ "${{ inputs.ksun_branch }}" = "next" ] || [ "${{ inputs.ksun_branch }}" = "dev" ]; then
            ZIPNAME="${ZIPNAME}-Next"
          elif [ "${{ inputs.ksun_branch }}" = "legacy-susfs" ]; then
            ZIPNAME="${ZIPNAME}-LegacySusfs"
          fi
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            ZIPNAME="${ZIPNAME}-SUSFS"
          fi
          if [ "${{ inputs.enable_cid_spoof }}" = "ioctl_only" ]; then
            ZIPNAME="${ZIPNAME}-CID"
          elif [ "${{ inputs.enable_cid_spoof }}" = "full" ]; then
            ZIPNAME="${ZIPNAME}-CID-Full"
          fi
          if [ "${{ inputs.enable_lto }}" = "thin" ]; then
            ZIPNAME="${ZIPNAME}-ThinLTO"
          elif [ "${{ inputs.enable_lto }}" = "full" ]; then
            ZIPNAME="${ZIPNAME}-FullLTO"
          fi
          if [ "${{ inputs.enable_polly }}" = "true" ]; then
            ZIPNAME="${ZIPNAME}-Polly"
          fi
          ZIPNAME="${ZIPNAME}.zip"
          echo "KERNEL_CODENAME=${KERNEL_CODENAME}" >> $GITHUB_ENV
          echo "KERNEL_RELVER=${KERNEL_RELVER}" >> $GITHUB_ENV
          echo "DEVICE_LABEL=${DEVICE_LABEL}" >> $GITHUB_ENV
          echo "Output zip: ${ZIPNAME}"

          cd AnyKernel3
          zip -r9 "../${ZIPNAME}" . -x ".git*" -x "README.md"
          cd ..
          echo "OUTZIP=${ZIPNAME}" >> $GITHUB_ENV
          ls -lah "${ZIPNAME}"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: C9-Kernel-${{ env.DEVICE_CODENAME || 'unknown' }}-KSUN-${{ github.run_number }}
          path: |
            ${{ env.OUTZIP }}
            kernel_source/build.log
            kernel_source/**/*.rej
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (cross-repo to C9-Kernel_releases)
        if: success() && env.OUTZIP != '' && inputs.enable_lto == 'off' && inputs.enable_polly == 'false' && inputs.ksun_branch != 'next' && !contains(inputs.kernel_relver, 'Test')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ env.KERNEL_CODENAME }}-${{ env.KERNEL_RELVER }}-${{ env.DEVICE_CODENAME }}
          name: C9-Kernel-${{ env.KERNEL_CODENAME }}-${{ env.KERNEL_RELVER }}-${{ env.DEVICE_LABEL }}-4.4
          repository: rianrizkifauzi/C9-Kernel_releases
          body: |
            C9-Kernel-linux version-4.4
            Codename: ${{ env.KERNEL_CODENAME }}
            Type: Stable

            Changelog ${{ env.KERNEL_RELVER }} :

            _• Compiled using Proton Clang (kdrag0n) latest._
            _• Bump to Linux ${{ env.KERNEL_VERSION }} (CIP-LTS)._
            _• Base on `${{ inputs.kernel_repo }}@${{ inputs.kernel_branch }}` (`${{ env.KERNEL_SHA }}`)._
            _• Integrate KernelSU-Next (`${{ inputs.ksun_branch }}` @ `${{ env.KSUN_VERSION }}`, KSU_VERSION=${{ env.FORCED_KSU_VERSION }})._
            _• Apply manual hooks from kucingoranye/kernel_patches (execveat, stat, faccessat, vfs_read, sys_reboot, selinux NNP bypass)._
            _• Backport `path_umount` from kernel 5.10.9 by backslashxx (KSUN driver requirement)._
            _• AnyKernel3 flashable zip with C9 banner._
            _• Build identity: JorianPonomaref@lavender44-actions._
            _• SUSFS: ${{ inputs.enable_susfs == 'true' && 'enabled' || 'disabled' }}._

            Tested on:
            _• Xiaomi Redmi Note 7 (Lavender / SDM660)._
            _• Android 11 / crDroid 7.x base ROM._
            _• KernelSU-Next Manager v3.3.0 (KSU_VERSION=${{ env.FORCED_KSU_VERSION }}) → Working._
            _• Zygisk Next latest → daemon running, both zygote injected._

            Full changelog : [CHANGELOG.md](https://github.com/rianrizkifauzi/C9-Kernel_xiaomi_lavender_419/blob/main/CHANGELOG.md)
            Build pipeline : [Run #${{ github.run_number }}](https://github.com/rianrizkifauzi/C9-Kernel_xiaomi_lavender_419/actions/runs/${{ github.run_id }})

            Flash via TWRP / OFOX. Backup boot partition before flashing.
          files: ${{ env.OUTZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
